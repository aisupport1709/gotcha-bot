<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gotcha Bot!</title>
<meta name="description" content="Trap the AI that learns. A puzzle game where you place hidden traps to stop a pathfinding AI.">
<meta name="theme-color" content="#101418">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<style>
  :root{
    --bg:#101418; --panel:#171D24; --cell-a:#1A2129; --cell-b:#161C23;
    --wall:#313C49; --wall-edge:#465464;
    --trap:#FF5C5C; --sense:#FFB020; --mem:#5A6572;
    --goal:#58C472; --start:#38B2A3; --ai:#8B7CF6; --ai-dark:#5F4FD1;
    --text:#E8ECF1; --muted:#8A93A0; --line:#232B34;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    height:100%; overscroll-behavior:none; overflow:hidden; touch-action:manipulation}
  body{display:flex; flex-direction:column; align-items:center; height:100dvh}
  .wrap{width:100%; max-width:460px; height:100%; padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:8px}
  header{display:flex; align-items:center; justify-content:space-between; gap:8px; flex:0 0 auto}
  h1{font-size:20px; font-weight:800; margin:0; letter-spacing:.3px}
  h1 .bang{color:var(--ai)}
  .langs{display:flex; gap:4px; background:var(--panel); border-radius:999px; padding:3px}
  .langs button{border:0; background:transparent; color:var(--muted); font-family:inherit;
    font-size:12px; font-weight:700; padding:5px 10px; border-radius:999px; cursor:pointer; touch-action:manipulation}
  .langs button.on{background:var(--ai); color:#fff}
  .sub{display:flex; align-items:center; gap:10px; flex:0 0 auto}
  .tagline{font-size:12.5px; color:var(--muted); flex:1; min-width:0}
  .best{font-size:12px; color:var(--muted); white-space:nowrap}
  .best b{color:var(--text)}
  .ctrlBtn{position:relative; flex:0 0 auto; width:40px; height:40px; border-radius:50%; border:0;
    background:var(--ai); color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .05s ease, background .2s; touch-action:manipulation}
  .ctrlBtn:active{transform:scale(.9)}
  .ctrlBtn.replay{background:var(--goal)}
  .ctrlBtn .ico{display:flex}
  .ctrlBtn .badge{position:absolute; top:-3px; right:-3px; min-width:15px; height:15px; padding:0 3px;
    border-radius:999px; background:var(--sense); color:#3A2A00; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center; line-height:1}
  .ctrlBtn .badge:empty{display:none}
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; flex:0 0 auto}
  .stat{background:var(--panel); border-radius:10px; padding:6px 8px; text-align:center}
  .stat .k{font-size:10px; color:var(--muted)}
  .stat .v{font-size:17px; font-weight:700; margin-top:1px}
  .boardWrap{flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center}
  #board{border-radius:14px; border:1px solid var(--line);
    touch-action:none; display:block; background:var(--panel)}
  .msg{background:var(--panel); border-radius:10px; padding:9px 12px; font-size:13.5px;
    color:var(--text); height:78px; overflow-y:auto; display:flex; align-items:center; gap:8px; line-height:1.45; flex:0 0 auto}
  .msg .dot{flex:0 0 10px; width:10px; height:10px; border-radius:50%; background:var(--ai)}
  .hint{font-size:11.5px; color:var(--muted); text-align:center; line-height:1.45; flex:0 0 auto}
  @media (max-height:700px){ .hint{display:none} }
  @media (max-height:560px){ .msg{display:none} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="brand"></h1>
    <div class="langs" id="langs">
      <button data-lang="vi">VI</button>
      <button data-lang="en">EN</button>
      <button data-lang="zh">中文</button>
    </div>
  </header>
  <div class="sub">
    <button id="ctrlBtn" class="ctrlBtn" type="button"><span class="ico" id="ctrlIco"></span><span class="badge" id="ctrlBadge"></span></button>
    <span class="tagline" id="tagline"></span>
    <span class="best"><span id="bestLabel"></span> <b id="best">0</b></span>
  </div>

  <div class="stats">
    <div class="stat"><div class="k" id="kRound"></div><div class="v" id="rd">1</div></div>
    <div class="stat"><div class="k" id="kTraps"></div><div class="v" id="tp">4</div></div>
    <div class="stat"><div class="k" id="kSense"></div><div class="v" id="iq">0%</div></div>
    <div class="stat"><div class="k" id="kSpeed"></div><div class="v" id="sp">x1.0</div></div>
  </div>

  <div class="boardWrap"><canvas id="board"></canvas></div>

  <div class="msg"><span class="dot"></span><span id="msg"></span></div>

  <div class="hint" id="hint"></div>
</div>

<script>
(function(){
  'use strict';

  // Belt-and-suspenders zoom blocker: the viewport meta and touch-action CSS
  // aren't honored for zoom gestures on every browser.
  document.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length > 1) e.preventDefault();
  }, {passive:false});
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  // Double-tap-zoom prevention, scoped to skip <button> only: board taps are
  // driven by pointerdown (not click), so preventing the touchend default
  // there is safe and closes the gap on the game's most-tapped surface.
  // Buttons rely on the synthesized click from touchend, so they're excluded
  // to avoid swallowing a legitimate quick re-tap on a control.
  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    if(e.target.closest('button')) return;
    var now = Date.now();
    if(now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});

  var BRAND = 'Gotcha Bot';

  var ICONS = {
    play: '<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>',
    pause: '<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>',
    replay: '<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>'
  };
  var CTRL_ICON = { start:'play', resumeRun:'play', continuePlace:'play', pauseRun:'pause', auto:'pause', replay:'replay' };
  var CTRL_LABEL_KEY = { start:'ctrlStart', resumeRun:'ctrlResume', continuePlace:'ctrlResume', pauseRun:'ctrlPause', auto:'ctrlPause', replay:'ctrlReplay' };

  var I18N = {
    vi: {
      tagline: 'Đặt bẫy chặn con AI biết học',
      bestLabel: 'Kỷ lục:',
      kRound: 'Vòng', kTraps: 'Bẫy còn', kSense: 'Giác quan', kSpeed: 'Tốc độ',
      ctrlStart: 'Bắt đầu', ctrlPause: 'Tạm dừng', ctrlResume: 'Tiếp tục', ctrlReplay: 'Chơi lại',
      hint: 'Ô đá xám = tường (ngẫu nhiên mỗi ván) · Dấu X = ô AI đã "thuộc" · Chạm lại bẫy đỏ để gỡ',
      welcome: 'Bản đồ mới! Chạm ô trống để đặt bẫy — AI không nhìn thấy bẫy. Xong thì bấm nút ▶ để bắt đầu.',
      running: 'AI xuất phát! Bạn vẫn đặt thêm bẫy được khi nó đang chạy. Chạm nút để tạm dừng.',
      memCell: 'AI đã "thuộc" ô này — đặt bẫy ở đó là vô ích.',
      noTraps: 'Hết bẫy! Sống sót qua vòng này để nhận thêm 2 cái.',
      died: function(r){ return ' (Vòng '+r+': nhanh hơn, thính hơn. +2 bẫy cho bạn. Tự động tiếp tục sau 2s — chạm nút để tạm dừng.)'; },
      overNewBest: function(k){ return 'AI về đích! Nhưng bạn vừa lập kỷ lục mới: cầm cự '+k+' vòng. Bấm nút ↻ để chơi lại.'; },
      over: function(r){ return 'AI về đích sau '+r+' vòng — nó khôn hơn bạn rồi. Bấm nút ↻ để phục thù.'; },
      cellStart: 'ĐI', cellGoal: 'ĐÍCH',
      ovTitle: 'AI đã thắng!',
      ovSub: function(k,b){ return 'Bạn cầm cự được '+k+' vòng · Kỷ lục: '+b; },
      dieMsgs: [
        'Á! Được lắm... tôi sẽ nhớ chỗ này.',
        'Đau đấy. Nhưng giờ tôi biết nó ở đâu rồi.',
        'Trúng bẫy! Bản đồ trong đầu tôi vừa được cập nhật.',
        'Cùng một chỗ tôi không chết hai lần đâu.',
        'Hự! Ghi chú: tránh xa ô đó ra.'
      ],
      senseMsgs: [
        'Khoan... tôi ngửi thấy mùi bẫy phía trước. Đi vòng!',
        'Ô này khả nghi. Né.',
        'Bạn tưởng giấu được tôi à? Thấy rồi nhé.',
        'Giác quan mách bảo: đừng bước vào đó.'
      ]
    },
    en: {
      tagline: 'Trap the AI that learns',
      bestLabel: 'Best:',
      kRound: 'Round', kTraps: 'Traps', kSense: 'Senses', kSpeed: 'Speed',
      ctrlStart: 'Start', ctrlPause: 'Pause', ctrlResume: 'Resume', ctrlReplay: 'Play again',
      hint: 'Gray stones = walls (random each game) · X = cells the AI memorized · Tap a red trap to remove it',
      welcome: 'New map! Tap empty cells to place traps — the AI can\'t see them. Then hit ▶ to start.',
      running: 'The AI is on the move! You can still drop traps while it runs. Tap the button to pause.',
      memCell: 'The AI memorized this cell — trapping it again is pointless.',
      noTraps: 'Out of traps! Survive this round to earn 2 more.',
      died: function(r){ return ' (Round '+r+': faster, sharper. +2 traps for you. Auto-continuing in 2s — tap to pause.)'; },
      overNewBest: function(k){ return 'The AI made it! But that\'s a new personal best: '+k+' rounds. Tap ↻ to beat it.'; },
      over: function(r){ return 'The AI reached the goal after '+r+' rounds — it officially outsmarted you. Tap ↻ for revenge.'; },
      cellStart: 'GO', cellGoal: 'GOAL',
      ovTitle: 'The AI wins!',
      ovSub: function(k,b){ return 'You held out for '+k+' rounds · Best: '+b; },
      dieMsgs: [
        'Ouch! Fine... I\'ll remember this spot.',
        'That hurt. But now I know where it is.',
        'Trapped! Mental map updated.',
        'I never die in the same place twice.',
        'Oof! Note to self: avoid that cell.'
      ],
      senseMsgs: [
        'Wait... I smell a trap ahead. Going around!',
        'This cell looks suspicious. Nope.',
        'You thought you could hide that from me?',
        'My senses say: do not step there.'
      ]
    },
    zh: {
      tagline: '设下陷阱，困住会学习的AI',
      bestLabel: '纪录：',
      kRound: '回合', kTraps: '陷阱', kSense: '感知', kSpeed: '速度',
      ctrlStart: '开始', ctrlPause: '暂停', ctrlResume: '继续', ctrlReplay: '再来一局',
      hint: '灰色石块 = 墙（每局随机生成）· X = AI已记住的格子 · 点击红色陷阱可移除',
      welcome: '新地图！点击空格放置陷阱——AI看不见陷阱。然后点▶开始。',
      running: 'AI出发了！它移动时你仍然可以放陷阱。点击按钮可暂停。',
      memCell: 'AI已经记住了这个格子——再放陷阱没有用。',
      noTraps: '陷阱用完了！撑过这一回合可以再得2个。',
      died: function(r){ return '（第'+r+'回合：更快、更敏锐。你获得2个陷阱。2秒后自动继续——点击可暂停。）'; },
      overNewBest: function(k){ return 'AI到达终点了！不过你刷新了纪录：坚持了'+k+'回合。点↻再来一局。'; },
      over: function(r){ return 'AI在第'+r+'回合到达终点——它比你聪明了。点↻报仇吧。'; },
      cellStart: '出发', cellGoal: '终点',
      ovTitle: 'AI获胜！',
      ovSub: function(k,b){ return '你坚持了'+k+'回合 · 纪录：'+b; },
      dieMsgs: [
        '啊！好吧……我会记住这个地方。',
        '好痛。不过现在我知道它在哪了。',
        '中招了！脑内地图已更新。',
        '同一个地方我不会死第二次。',
        '呃！笔记：远离那个格子。'
      ],
      senseMsgs: [
        '等等……前面有陷阱的味道。绕路！',
        '这个格子很可疑。躲开。',
        '你以为能瞒过我吗？看到了。',
        '直觉告诉我：别踩那里。'
      ]
    }
  };

  var lang = 'en';
  try { lang = localStorage.getItem('gb_lang') || ''; } catch(e){}
  if(!I18N[lang]){
    var nav = (navigator.language||'en').toLowerCase();
    lang = nav.indexOf('vi')===0 ? 'vi' : (nav.indexOf('zh')===0 ? 'zh' : 'en');
  }
  var T = I18N[lang];

  var COLS = 9, ROWS = 13;
  var START = {x:4, y:0}, GOAL = {x:4, y:ROWS-1};
  var wrapEl = document.querySelector('.wrap');
  var cv = document.getElementById('board'), ctx = cv.getContext('2d');
  var msgEl = document.getElementById('msg');
  var rdEl = document.getElementById('rd'), tpEl = document.getElementById('tp');
  var iqEl = document.getElementById('iq'), spEl = document.getElementById('sp');
  var bestEl = document.getElementById('best');
  var ctrlBtn = document.getElementById('ctrlBtn'), ctrlIco = document.getElementById('ctrlIco'), ctrlBadge = document.getElementById('ctrlBadge');

  var msgKey = 'welcome', msgArgs = null;
  function say(key, args){
    msgKey = key; msgArgs = args || null;
    var v = T[key];
    msgEl.textContent = (typeof v === 'function') ? v.apply(null, msgArgs) : (v !== undefined ? v : key);
  }
  function sayRaw(text){ msgKey = null; msgEl.textContent = text; }

  function applyLang(){
    T = I18N[lang];
    document.documentElement.lang = lang;
    document.getElementById('brand').innerHTML = BRAND + '<span class="bang">!</span>';
    document.title = BRAND + '!';
    document.getElementById('tagline').textContent = T.tagline;
    document.getElementById('bestLabel').textContent = T.bestLabel;
    document.getElementById('kRound').textContent = T.kRound;
    document.getElementById('kTraps').textContent = T.kTraps;
    document.getElementById('kSense').textContent = T.kSense;
    document.getElementById('kSpeed').textContent = T.kSpeed;
    document.getElementById('hint').textContent = T.hint;
    var btns = document.querySelectorAll('#langs button');
    for(var i=0;i<btns.length;i++) btns[i].className = btns[i].getAttribute('data-lang')===lang ? 'on' : '';
    if(msgKey) say(msgKey, msgArgs);
    updateCtrlBtn();
  }
  document.getElementById('langs').addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    lang = b.getAttribute('data-lang');
    try{ localStorage.setItem('gb_lang', lang); }catch(err){}
    applyLang();
    fit();
  });

  var C = {};
  (function(){
    var s = getComputedStyle(document.documentElement);
    ['cell-a','cell-b','wall','wall-edge','trap','sense','mem','goal','start','ai','ai-dark','text','muted','line']
      .forEach(function(n){ C[n] = s.getPropertyValue('--'+n).trim(); });
  })();

  var CS = 44, DPR = Math.max(1, Math.min(2, window.devicePixelRatio||1));
  function fit(){
    var maxW = Math.min(cv.parentElement.clientWidth, 460 - 24);
    var kids = wrapEl.children, others = 0, i;
    for(i=0;i<kids.length;i++){ if(kids[i] !== cv.parentElement) others += kids[i].getBoundingClientRect().height; }
    var cs = getComputedStyle(wrapEl);
    var padV = (parseFloat(cs.paddingTop)||0) + (parseFloat(cs.paddingBottom)||0);
    var gapPx = parseFloat(cs.rowGap || cs.gap) || 0;
    var gapV = gapPx * (kids.length - 1);
    var availH = window.innerHeight - others - padV - gapV - 4;
    var maxHByHeight = Math.floor(availH / ROWS);
    var maxHByWidth = Math.floor(maxW / COLS);
    CS = Math.max(18, Math.min(maxHByWidth, maxHByHeight));
    var pw = CS*COLS, ph = CS*ROWS;
    cv.width = pw*DPR; cv.height = ph*DPR;
    cv.style.width = pw+'px'; cv.style.height = ph+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', fit);
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit); }

  var K = function(x,y){ return x+','+y; };
  var phase, round, trapsLeft, traps, memory, sensed, walls, ai, path, pathIdx, anim, stepTimer, over, deadFx, kills;
  var everStarted, paused, pauseStart, autoInterval, autoCountdown;
  var best = 0;
  try { best = parseInt(localStorage.getItem('gb_best')||localStorage.getItem('datbay_best')||'0', 10) || 0; } catch(e){}
  bestEl.textContent = best;

  function senseChance(){ return Math.min(0.12*(round-1), 0.85); }
  function stepMs(){ return Math.max(95, 300*Math.pow(0.92, round-1)); }
  function updHud(){
    rdEl.textContent = round; tpEl.textContent = trapsLeft;
    iqEl.textContent = Math.round(senseChance()*100)+'%';
    spEl.textContent = 'x'+(300/stepMs()).toFixed(1);
  }
  function shuffle(a){
    for(var i=a.length-1;i>0;i--){ var j=(Math.random()*(i+1))|0, t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }

  function bfs(fromX, fromY, blocked){
    var q=[[fromX,fromY]], prev={}, seen={};
    seen[K(fromX,fromY)] = true;
    while(q.length){
      var cur=q.shift(), x=cur[0], y=cur[1];
      if(x===GOAL.x && y===GOAL.y){
        var p=[], k=K(x,y);
        while(k !== undefined){
          var xy=k.split(','); p.unshift({x:+xy[0], y:+xy[1]}); k=prev[k];
        }
        return p;
      }
      var dirs = shuffle([[1,0],[-1,0],[0,1],[0,-1]]);
      for(var i=0;i<4;i++){
        var nx=x+dirs[i][0], ny=y+dirs[i][1], k2=K(nx,ny);
        if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
        if(seen[k2] || walls[k2] || blocked[k2]) continue;
        seen[k2]=true; prev[k2]=K(x,y); q.push([nx,ny]);
      }
    }
    return null;
  }

  function genWalls(){
    for(var attempt=0; attempt<300; attempt++){
      walls = {};
      var target = 14 + ((Math.random()*5)|0);
      var placed = 0, guard = 0;
      while(placed < target && guard < 600){
        guard++;
        var x = (Math.random()*COLS)|0, y = 1 + ((Math.random()*(ROWS-2))|0);
        var len = Math.random()<0.45 ? 2 + ((Math.random()*2)|0) : 1;
        var horiz = Math.random()<0.5;
        for(var i=0;i<len;i++){
          var wx = horiz? x+i : x, wy = horiz? y : y+i;
          if(wx<0||wy<1||wx>=COLS||wy>=ROWS-1) continue;
          if((wx===START.x&&wy===START.y)||(wx===GOAL.x&&wy===GOAL.y)) continue;
          if(!walls[K(wx,wy)]){ walls[K(wx,wy)]=true; placed++; }
        }
      }
      if(bfs(START.x, START.y, {})) return;
    }
    walls = {};
  }

  function merge(a,b){ var o={},k; for(k in a)o[k]=1; for(k in b)o[k]=1; return o; }
  function plan(){
    return bfs(ai.x, ai.y, merge(memory, sensed))
        || bfs(ai.x, ai.y, sensed)
        || bfs(ai.x, ai.y, {});
  }

  function ctrlState(){
    if(phase==='over') return 'replay';
    if(phase==='run') return paused ? 'resumeRun' : 'pauseRun';
    if(!everStarted) return 'start';
    if(autoInterval) return 'auto';
    return 'continuePlace';
  }

  function updateCtrlBtn(){
    var s = ctrlState();
    ctrlIco.innerHTML = ICONS[CTRL_ICON[s]];
    var label = T[CTRL_LABEL_KEY[s]] || '';
    ctrlBtn.setAttribute('aria-label', label);
    ctrlBtn.title = label;
    ctrlBtn.classList.toggle('replay', s==='replay');
    ctrlBadge.textContent = s==='auto' ? String(autoCountdown) : '';
  }

  function onCtrlClick(){
    var s = ctrlState();
    if(s==='start' || s==='continuePlace') startRun();
    else if(s==='pauseRun') pauseRun();
    else if(s==='resumeRun') resumeRun();
    else if(s==='auto'){ clearAutoContinue(); updateCtrlBtn(); }
    else if(s==='replay') newGame();
  }
  ctrlBtn.addEventListener('click', onCtrlClick);

  function clearAutoContinue(){
    if(autoInterval){ clearInterval(autoInterval); autoInterval=null; }
    autoCountdown = 0;
  }
  function scheduleAutoContinue(){
    clearAutoContinue();
    autoCountdown = 2;
    autoInterval = setInterval(function(){
      autoCountdown--;
      if(autoCountdown<=0){
        clearAutoContinue();
        startRun();
      } else {
        updateCtrlBtn();
      }
    }, 1000);
    updateCtrlBtn();
  }

  function pauseRun(){
    if(phase!=='run' || paused) return;
    paused = true;
    clearTimeout(stepTimer);
    pauseStart = performance.now();
    updateCtrlBtn();
  }
  function resumeRun(){
    if(phase!=='run' || !paused) return;
    var delta = performance.now() - pauseStart;
    if(anim) anim.t0 += delta;
    paused = false; pauseStart = null;
    if(!anim) stepTimer = setTimeout(step, 10);
    updateCtrlBtn();
  }

  function newGame(){
    phase='place'; round=1; trapsLeft=4; kills=0;
    traps={}; memory={}; sensed={};
    ai={x:START.x, y:START.y, px:START.x, py:START.y};
    path=null; pathIdx=0; anim=null; over=false; deadFx=null;
    everStarted=false; paused=false; pauseStart=null;
    clearTimeout(stepTimer);
    clearAutoContinue();
    genWalls();
    say('welcome');
    updHud();
    updateCtrlBtn();
  }

  function startRun(){
    if(phase!=='place') return;
    clearAutoContinue();
    phase='run'; everStarted=true; paused=false;
    path = plan(); pathIdx = 0;
    say('running');
    updateCtrlBtn();
    stepTimer = setTimeout(step, 60);
  }

  function step(){
    if(phase!=='run') return;
    if(!path || pathIdx>=path.length-1){ gameOver(); return; }
    var next = path[pathIdx+1], nk = K(next.x, next.y);
    if(traps[nk] && !sensed[nk] && Math.random()<senseChance()){
      sensed[nk]=true;
      sayRaw(T.senseMsgs[(Math.random()*T.senseMsgs.length)|0]);
      var np = plan();
      if(np){ path=np; pathIdx=0; }
      stepTimer = setTimeout(step, stepMs());
      return;
    }
    anim = {fx:ai.x, fy:ai.y, tx:next.x, ty:next.y, t0:performance.now(), dur:stepMs()};
  }

  function arrive(){
    ai.x=anim.tx; ai.y=anim.ty; ai.px=ai.x; ai.py=ai.y; anim=null;
    var k = K(ai.x, ai.y);
    if(traps[k]){
      delete traps[k]; memory[k]=true;
      deadFx = {x:ai.x, y:ai.y, t0:performance.now()};
      if(navigator.vibrate) navigator.vibrate(60);
      kills++; round++; trapsLeft+=2; updHud();
      sayRaw(T.dieMsgs[(Math.random()*T.dieMsgs.length)|0] + T.died(round));
      phase='place'; paused=false;
      ai={x:START.x, y:START.y, px:START.x, py:START.y};
      scheduleAutoContinue();
      return;
    }
    pathIdx++;
    stepTimer = setTimeout(step, 10);
  }

  function gameOver(){
    phase='over'; over=true; clearTimeout(stepTimer); clearAutoContinue();
    updateCtrlBtn();
    if(kills>best){
      best=kills; bestEl.textContent=best;
      try{ localStorage.setItem('gb_best', String(best)); }catch(e){}
      say('overNewBest', [kills]);
    } else {
      say('over', [round]);
    }
    if(navigator.vibrate) navigator.vibrate([80,60,80]);
  }

  cv.addEventListener('pointerdown', function(e){
    e.preventDefault();
    if(phase==='over') return;
    var r = cv.getBoundingClientRect();
    var x = ((e.clientX-r.left)/CS)|0, y = ((e.clientY-r.top)/CS)|0;
    if(x<0||y<0||x>=COLS||y>=ROWS) return;
    var k = K(x,y);
    if(walls[k]) return;
    if((x===START.x&&y===START.y)||(x===GOAL.x&&y===GOAL.y)) return;
    if(phase==='run' && Math.abs(x-ai.px)<0.8 && Math.abs(y-ai.py)<0.8) return;
    if(traps[k]){
      if(phase==='place' && !sensed[k]){ delete traps[k]; trapsLeft++; updHud(); }
      return;
    }
    if(memory[k]){ say('memCell'); return; }
    if(trapsLeft<=0){ say('noTraps'); return; }
    traps[k]=true; trapsLeft--; updHud();
  });

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function draw(now){
    ctx.clearRect(0,0,CS*COLS,CS*ROWS);
    var x,y,k;
    for(y=0;y<ROWS;y++) for(x=0;x<COLS;x++){
      ctx.fillStyle = (x+y)%2 ? C['cell-a'] : C['cell-b'];
      ctx.fillRect(x*CS, y*CS, CS, CS);
    }
    for(k in walls){
      var w=k.split(','); x=+w[0]; y=+w[1];
      ctx.fillStyle = C['wall'];
      roundRect(x*CS+2, y*CS+2, CS-4, CS-4, 5); ctx.fill();
      ctx.strokeStyle = C['wall-edge']; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x*CS+6, y*CS+CS*0.4); ctx.lineTo(x*CS+CS-6, y*CS+CS*0.4);
      ctx.moveTo(x*CS+CS*0.45, y*CS+CS*0.4); ctx.lineTo(x*CS+CS*0.45, y*CS+CS-4);
      ctx.stroke();
    }
    ctx.fillStyle = C['start'];
    roundRect(START.x*CS+3, START.y*CS+3, CS-6, CS-6, 6); ctx.fill();
    ctx.fillStyle = C['goal'];
    roundRect(GOAL.x*CS+3, GOAL.y*CS+3, CS-6, CS-6, 6); ctx.fill();
    ctx.fillStyle = '#08130D';
    var fs = lang==='zh' ? CS*0.3 : CS*0.24;
    ctx.font = '700 '+Math.max(10, fs)+'px system-ui';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(T.cellStart, START.x*CS+CS/2, START.y*CS+CS/2);
    ctx.fillText(T.cellGoal, GOAL.x*CS+CS/2, GOAL.y*CS+CS/2);

    ctx.lineWidth = 2.5; ctx.strokeStyle = C['mem'];
    for(k in memory){
      var m=k.split(','); x=+m[0]; y=+m[1];
      var p = CS*0.3;
      ctx.beginPath();
      ctx.moveTo(x*CS+p, y*CS+p); ctx.lineTo(x*CS+CS-p, y*CS+CS-p);
      ctx.moveTo(x*CS+CS-p, y*CS+p); ctx.lineTo(x*CS+p, y*CS+CS-p);
      ctx.stroke();
    }
    for(k in traps){
      var t=k.split(','); x=+t[0]; y=+t[1];
      var s = sensed[k];
      ctx.fillStyle = s ? C['sense'] : C['trap'];
      ctx.beginPath(); ctx.arc(x*CS+CS/2, y*CS+CS/2, CS*0.2, 0, 7); ctx.fill();
      if(s){
        ctx.fillStyle='#3A2A00';
        ctx.font='700 '+Math.max(10,CS*0.28)+'px system-ui';
        ctx.fillText('!', x*CS+CS/2, y*CS+CS/2+1);
      } else {
        ctx.strokeStyle = C['trap']; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(x*CS+CS/2, y*CS+CS/2, CS*0.3, 0, 7); ctx.stroke();
      }
    }

    if(anim && !paused){
      var tt = Math.min(1, (now-anim.t0)/anim.dur);
      ai.px = anim.fx + (anim.tx-anim.fx)*tt;
      ai.py = anim.fy + (anim.ty-anim.fy)*tt;
      if(tt>=1) arrive();
    }
    var X = ai.px*CS+CS/2, Y = ai.py*CS+CS/2, R = CS*0.3;
    ctx.fillStyle = C['ai'];
    ctx.beginPath(); ctx.arc(X, Y, R, 0, 7); ctx.fill();
    ctx.fillStyle = C['ai-dark'];
    ctx.beginPath();
    ctx.arc(X-R*0.38, Y-R*0.2, R*0.18, 0, 7);
    ctx.arc(X+R*0.38, Y-R*0.2, R*0.18, 0, 7);
    ctx.fill();
    ctx.strokeStyle = C['ai-dark']; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(X, Y+R*0.25, R*0.36, 0.25, Math.PI-0.25); ctx.stroke();

    if(deadFx){
      var dt = (now-deadFx.t0)/500;
      if(dt<1){
        ctx.strokeStyle = C['trap']; ctx.lineWidth=3; ctx.globalAlpha = 1-dt;
        ctx.beginPath();
        ctx.arc(deadFx.x*CS+CS/2, deadFx.y*CS+CS/2, CS*0.2 + dt*CS*0.6, 0, 7);
        ctx.stroke(); ctx.globalAlpha=1;
      } else deadFx=null;
    }

    if(over){
      ctx.fillStyle='rgba(6,8,11,0.72)';
      ctx.fillRect(0,0,CS*COLS,CS*ROWS);
      ctx.fillStyle=C['text'];
      ctx.font='700 '+Math.max(20,CS*0.55)+'px system-ui';
      ctx.fillText(T.ovTitle, CS*COLS/2, CS*ROWS/2 - CS*0.5);
      ctx.font='400 '+Math.max(13,CS*0.34)+'px system-ui';
      ctx.fillStyle=C['muted'];
      ctx.fillText(T.ovSub(kills, best), CS*COLS/2, CS*ROWS/2 + CS*0.3);
    }
    requestAnimationFrame(draw);
  }

  newGame();
  applyLang();
  fit();
  requestAnimationFrame(draw);
})();
</script>
</body>
